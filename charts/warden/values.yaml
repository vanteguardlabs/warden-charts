# Skeleton chart: 1 replica per service, no infra bundled, /health +
# /readyz probes on every service. Override per-service under
# `services.<svc>`.

# Tag fallback chain: services.<svc>.image.tag → imageTag → appVersion.
imageRegistry: ghcr.io/vanteguardlabs
imageTag: ""
imagePullPolicy: IfNotPresent
imagePullSecrets: []

# NATS + Vault default to BYO (bring-your-own). Flip `bundled.enabled`
# to have the chart install the upstream subcharts alongside the
# warden services in a single `helm install` — see Chart.yaml deps.
nats:
  # Injected as NATS_URL into every service when bundled.enabled is
  # false. When bundled.enabled is true, the helper overrides this
  # with the in-cluster service DNS (`nats://<release>-nats:4222`).
  url: nats://nats:4222
  bundled:
    # Set true to install the upstream nats-io/nats subchart
    # alongside the warden services. Single-node JetStream is the
    # default shape; see tests/values-bundled.yaml for the canonical
    # bundled config (JetStream + PVC + mTLS). All other keys under
    # `nats:` pass through to the upstream subchart — see
    # https://github.com/nats-io/k8s/blob/main/helm/charts/nats/values.yaml
    # for the full surface.
    #
    # mTLS coupling: when `tlsBundle.secretName` is also set, the
    # warden services dial NATS over TLS (NATS_TLS_{CERT,KEY,CA}_PATH
    # → require_tls in async-nats). The subchart must terminate TLS to
    # match — set `nats.config.nats.tls.enabled: true` (+ `verify: true`
    # via `merge`) and `nats.tlsCA.enabled: true` against the same
    # Secret. The warden.natsUrl helper render-fails if you enable one
    # side without the other (avoids the `InvalidContentType` crash).
    enabled: false

vault:
  # VAULT_ADDR for proxy + identity when bundled.enabled is false.
  # Empty disables Vault wiring. When bundled.enabled is true, the
  # helper overrides this with `http://<release>-vault:8200`.
  addr: ""
  # k8s Secret holding `token` key for VAULT_TOKEN. Empty disables.
  # When bundled.enabled is true, autogenerated as
  # `<release>-vault-token` carrying the dev-mode root token.
  tokenSecretName: ""
  bundled:
    # Set true to install the upstream hashicorp/vault subchart
    # in dev mode (auto-unsealed, in-memory) and auto-provision the
    # transit engine + `warden-identity` key via a post-install Job.
    # Dev mode loses state on pod restart; the post-install hook
    # re-creates the transit key on every upgrade. Production
    # deployments should set this false and point `vault.addr` /
    # `vault.tokenSecretName` at an externally-managed Vault.
    enabled: false
    # Known dev-mode root token. Mounted to proxy + identity via the
    # autogenerated Secret. Matches the compose stack's default.
    devToken: root
    transit:
      # Name of the transit key the bootstrap Job creates. Must match
      # `warden-identity`'s `WARDEN_IDENTITY_VAULT_KEY_NAME` env
      # (default `warden-identity`). Override only if you've changed
      # the identity-side env explicitly.
      keyName: warden-identity

# Bundled lab-only echo MCP server. The warden-proxy forwards every
# approved tool call to WARDEN_UPSTREAM_URL; production deploys point
# this at a real MCP server (filesystem-MCP, GitHub-MCP, etc.). Setting
# `upstreamStub.enabled=true` instead deploys the `warden-upstream-stub`
# binary (shipped inside the warden-simulator image) as a sidecar
# Deployment + Service in the release and auto-wires
# `WARDEN_UPSTREAM_URL=http://<release>-upstream-stub:9000/mcp` on the
# proxy. The stub echoes every MCP frame back verbatim — handy for
# proving the Brain + Policy + HIL + ledger path end-to-end without
# bringing up a real MCP server. Not for production use.
#
# Pairs with `agentVaultSeed.enabled` (below) so the chart-deployed
# Vault carries the `agent-001` stub credential the proxy gates on.
upstreamStub:
  enabled: false
  image:
    # The simulator image ships `warden-upstream-stub` as a secondary
    # binary alongside the main simulator. Same image, command override
    # in templates/upstream-stub.yaml selects the stub binary.
    repository: ghcr.io/vanteguardlabs/warden-simulator
    # Pinned to 0.1.2 (MCP-protocol-compliant stub: real initialize +
    # tools/list + tools/call shapes) rather than tracking
    # Chart.appVersion. The stub binary's protocol level is independent
    # of the rest of the warden stack — operators bumping the chart
    # appVersion shouldn't accidentally roll back to the earlier echo-
    # only stub (warden-simulator:0.1.1) that doesn't complete an MCP
    # handshake.
    tag: "0.1.2"
    pullPolicy: IfNotPresent
  port: 9000

# One-shot Job that seeds Vault with a stub api_key for agent-001 (the
# CN baked into the auto-mint starter `client.crt`). The proxy refuses
# every request with `403 No credentials found for agent <id>` until a
# Vault entry exists at `secret/data/agents/<id>`. The Job is opt-in;
# operators using BYO Vault must seed the entry themselves (see
# `lab/README.md` for the curl).
#
# Gated on BOTH `agentVaultSeed.enabled` AND `vault.bundled.enabled` —
# without the bundled Vault, there's nothing for the Job to talk to.
agentVaultSeed:
  enabled: false
  # The agent_id the proxy will see on inbound mTLS connections. Matches
  # the CN in the auto-mint starter client cert. Change only if you've
  # supplied a custom tlsBundle Secret with a different starter CN.
  agentId: agent-001
  # The opaque value stored under `secret/data/agents/<agentId>`. The
  # proxy only checks for *presence*, not value, so the literal here is
  # a marker. Production deployments source real per-agent credentials
  # from their own Vault policies — this Job is lab-only.
  stubApiKey: stub-key

# Drain cap in seconds. Set as WARDEN_GRACEFUL_DRAIN_SECS;
# terminationGracePeriodSeconds = drainCapSecs + 5 so kubelet SIGKILL
# fires after the in-process watchdog has had its window.
drainCapSecs: 30

# Grafana dashboard ConfigMaps. Bundles warden-overview + warden-cost
# (the two dashboards shipped under charts/warden/dashboards/). The
# kube-prometheus-stack Grafana sidecar discovers them via the
# `grafana_dashboard: "1"` label. Disable if your Grafana isn't running
# the sidecar — operators can still import the JSON manually from
# the chart source.
dashboards:
  enabled: true

# Prometheus alerting rules. Ship the rule catalog
# (charts/warden/alerts/*.yaml) into a ConfigMap labelled
# `prometheus_rule: "1"`. kube-prometheus-stack discovers via that
# label. Set `enabled: false` if your Prometheus is configured to
# load rules differently.
alerting:
  enabled: true

# Alertmanager routing. Disabled by default — most operators already
# run an Alertmanager and want to merge warden alerts into it.
# When enabled, the chart projects a Secret with severity-based
# routing (critical → slack + email, warning → slack only). Channel
# `#warden-ops` is deliberately distinct from HIL's `#warden-approvals`.
alertmanager:
  enabled: false
  slack:
    # Slack webhook URL for ops channel. Required when alertmanager
    # is enabled.
    opsWebhookUrl: ""
  email:
    # Critical-severity alerts also email this address. Empty disables
    # the email receiver and falls back to slack-only.
    to: ""
    from: ""
    smtp:
      host: ""
      port: 587
      username: ""
      # In prod, source this from a secretKeyRef rather than literal
      # values. Inline is fine for evaluation clusters.
      password: ""

# Every service Dockerfile ships USER 65532 (Google distroless nonroot).
# fsGroup remounts PVCs so SQLite writes work on ledger/hil/identity.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Prometheus scrape: pod-level annotations only (no ServiceMonitor/
# PodMonitor CRD) so this works with vanilla Prometheus + the
# de-facto `prometheus.io/scrape` discovery rule. Cardinality is
# bounded in-process — no per-agent labels. Disable per-service via
# `services.<svc>.metrics.enabled: false`; layer extra annotations
# via `services.<svc>.metrics.extraAnnotations`.

probeDefaults:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

services:
  proxy:
    enabled: true
    replicas: 1
    image:
      repository: warden-proxy
      tag: ""
    port: 8443        # mTLS surface — Service exposes this for agents
    healthPort: 8080  # plain-HTTP /health + /readyz — kubelet probes this
    serviceType: ClusterIP
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
      # Proxy's main port is mTLS-gated; probes target healthPort.
      port: 8080
    extraEnv:
      - name: WARDEN_PROXY_HEALTH_ADDR
        value: 0.0.0.0:8080
    # Metrics on the plain-HTTP port so vanilla Prometheus pods can
    # scrape without a client cert.
    metrics:
      enabled: true
      port: 8080

  brain:
    enabled: true
    replicas: 1
    image:
      repository: warden-brain
      tag: ""
    # Application port. Plain HTTP without tlsBundle.secretName set;
    # rustls + SPIFFE-allowlist on the same port when the bundle is
    # mounted. WARDEN_BRAIN_TLS_DIR + ALLOWED_CALLERS env vars are
    # auto-injected by `warden.backendEnvs` when tlsBundle is set
    # (B7 v1.x+2 session 3).
    port: 8081
    # Plain-HTTP /health + /readyz + /metrics under TLS mode so
    # kubelet probes and Prometheus scrapes don't need a client cert.
    # Probes auto-aim at healthPort (see _helpers.tpl). Under plain
    # HTTP mode brain serves everything on `port`; the chart's probe
    # helper falls back to `port` when healthPort is unused.
    healthPort: 9081
    serviceType: ClusterIP
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    # mock-key keeps the chart usable out-of-box; prod overrides via
    # --set or secretKeyRef.
    extraEnv:
      - name: ANTHROPIC_API_KEY
        value: mock-key
    metrics:
      enabled: true

  policyEngine:
    enabled: true
    replicas: 1
    image:
      repository: warden-policy-engine
      tag: ""
    # Application port. Plain HTTP without tlsBundle.secretName set;
    # rustls + SPIFFE-allowlist on the same port when the bundle is
    # mounted. WARDEN_POLICY_TLS_DIR + ALLOWED_CALLERS env vars are
    # auto-injected by `warden.backendEnvs` when tlsBundle is set
    # (B7 v1.x+2 session 4).
    port: 8082
    # Plain-HTTP /health + /readyz + /metrics under TLS mode (kubelet
    # probes + Prometheus scrapes don't carry a client cert). Under
    # plain HTTP mode the engine serves everything on `port`; the
    # chart's probe helper falls back to `port` when healthPort is
    # unused.
    healthPort: 9082
    serviceType: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 250m, memory: 256Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    extraEnv: []
    metrics:
      enabled: true

  ledger:
    enabled: true
    # SQLite mode (the default below) is pinned to replicas: 1.
    # Concurrent writers across replicas corrupt the SQLite file even
    # on a shared RWX PVC, and SQLite's WAL doesn't help across hosts.
    #
    # Postgres mode lifts that pin. Set:
    #   WARDEN_LEDGER_BACKEND: "postgres"
    #   WARDEN_LEDGER_PG_URL: "postgres://user:pass@host:5432/warden"
    # and the ledger pool can scale to N replicas (Postgres serializes
    # the chain append on a UNIQUE(seq) constraint; deadpool sizes
    # the per-pod pool). Cold-tier export, regulatory bundles,
    # Iceberg metadata, and the egress sweeper are SQLite-only and
    # return 503 under Postgres mode — wire your SIEM ingest directly
    # against the Postgres chain table instead. See HA_RUNBOOK.md.
    replicas: 1
    image:
      repository: warden-ledger
      tag: ""
    # Plain HTTP listener — serves Caddy / Ingress for the public
    # `/verify` + `/audit/{agent_id}*` browser surface, kubelet probes
    # (`/health` + `/readyz`), and Prometheus scrapes (`/metrics`).
    port: 8083
    # mTLS application port under TLS mode (B7 v1.x+2 session 5).
    # `warden.backendEnvs` injects WARDEN_LEDGER_MTLS_ADDR pointing at
    # this when tlsBundle is set; the internal write + console-only
    # read surface lives behind rustls + SPIFFE-allowlist here. The
    # Service template currently only exposes `port`; operators
    # wanting console → ledger over mTLS must add a second Service
    # entry (8183) and update the console URL env var.
    mtlsPort: 8183
    serviceType: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    # SQLite default. To use Postgres, drop WARDEN_LEDGER_DB, add
    # `WARDEN_LEDGER_BACKEND=postgres` + `WARDEN_LEDGER_PG_URL=…`,
    # and bump `replicas`.
    extraEnv:
      - name: WARDEN_LEDGER_DB
        value: /var/lib/warden/ledger.db
    metrics:
      enabled: true

  hil:
    enabled: true
    # SQLite-backed; pin replicas to 1. No Postgres backend planned
    # for hil in v1 — multi-replica HIL is gated on the storage
    # trait migration spreading from ledger to hil + identity.
    replicas: 1
    image:
      repository: warden-hil
      tag: ""
    port: 8084
    # Plain-HTTP /health + /readyz + /metrics under mTLS receive
    # (session 6). Kubelet + Prometheus scrape here; the application
    # port (8084) is rustls-gated when tlsBundle.secretName is set.
    healthPort: 9084
    serviceType: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 250m, memory: 256Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    extraEnv:
      - name: WARDEN_HIL_DB
        value: /var/lib/warden/hil.db
    metrics:
      enabled: true

  identity:
    enabled: true
    # SQLite-backed (agents table + agent_ledger lifecycle chain).
    # Pin replicas to 1 — same SQLite-on-shared-PVC constraint as
    # ledger and hil.
    replicas: 1
    image:
      repository: warden-identity
      tag: ""
    port: 8086
    # Dual-listener under mTLS receive (session 6). Plain HTTP on
    # `port` serves the public subset + /stats + JWKS + health; mTLS
    # on `mtlsPort` carries the internal /svid + /grant + /sign +
    # /actor-token + /agents surface. Service template still exposes
    # one port today — operators wiring console/proxy → identity over
    # mTLS in-cluster must add a second Service port until the
    # dual-port template lands (later chart minor).
    mtlsPort: 8186
    serviceType: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 250m, memory: 256Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    extraEnv:
      - name: WARDEN_IDENTITY_DB
        value: /var/lib/warden/identity.db
    metrics:
      enabled: true

  # Forensic-tier async auditor. Subscribes to warden.forensic, samples,
  # runs the configured LLM against the bundle. Pairs with brain (fast,
  # in-band) as the slow-but-deep tier. Spec §"Forensic-tier deep review".
  # Singleton like brain — no PVC; per-agent history rides NATS, daily
  # budget is per-pod (operator runs one replica, scales the cap not the
  # pods).
  deepReview:
    enabled: true
    replicas: 1
    image:
      repository: warden-deep-review
      tag: ""
    # /metrics + /health scrape port. 8087 because identity owns 8086.
    port: 8087
    serviceType: ClusterIP
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    # Deep-review's axum router only mounts /health (not /readyz like
    # the other services); pointing readiness at /health avoids the
    # 404 that would otherwise hold the pod NotReady forever. Worth
    # adding a real /readyz to warden-deep-review as a follow-up.
    probes:
      type: httpGet
      health: /health
      ready: /health
    # mock-key default keeps the chart usable without an Anthropic
    # account. Prod overrides via --set or secretKeyRef. Daily token
    # cap matches the demo-VPS pin — bump for real-traffic operators.
    extraEnv:
      - name: WARDEN_DEEP_REVIEW_ANTHROPIC_API_KEY
        value: mock-key
      - name: WARDEN_DEEP_REVIEW_DAILY_TOKEN_CAP
        value: "200000"
      - name: WARDEN_DEEP_REVIEW_SAMPLE_RATE_GREEN
        value: "0.01"
    metrics:
      enabled: true

  # Operator UI. Read-only against ledger + HIL + policy-engine +
  # identity (proxy to its own data-plane is via SDK). Three auth modes:
  # `oidc` (prod default), `basic-admin` (single-operator), `disabled`
  # (demo VPS — synthetic Admin every request; refuse non-loopback
  # binds unless ALLOW_DISABLED_NETWORK is true). Defaults below mirror
  # the prod compose stack's `oidc` posture; flip to `disabled` only
  # for demo/eval clusters.
  console:
    enabled: true
    replicas: 1
    image:
      repository: warden-console
      tag: ""
    port: 8085
    serviceType: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 250m, memory: 256Mi }
    probes:
      type: httpGet
      health: /health
      ready: /readyz
    # Backend URLs are derived from .Release.Name + service names via
    # the helper. Override via --set if you front the stack with a
    # service mesh that renames Services.
    extraEnv:
      - name: WARDEN_CONSOLE_BIND
        value: 0.0.0.0
      # Auth mode default is `disabled` so a fresh install boots
      # without operator OIDC/SAML config. Other modes (oidc,
      # webauthn, basic-admin, saml) require additional env that
      # operators set via --set or a values overlay; see
      # warden-console/src/auth_session.rs for the per-mode
      # required env. Decide-token is wired regardless (the
      # shared-tokens Secret) — every mode requires it.
      - name: WARDEN_CONSOLE_AUTH
        value: disabled
      # `disabled` + 0.0.0.0 bind would otherwise be rejected as a
      # production footgun (unauthenticated access from anywhere on
      # the cluster network). The chart's posture is deliberate for
      # lab/dev installs — every Service is ClusterIP-only and the
      # bundled stack matches the compose-stack threat model.
      # Production operators should flip WARDEN_CONSOLE_AUTH to a
      # real mode (oidc/webauthn/saml) and drop this override.
      - name: WARDEN_CONSOLE_ALLOW_DISABLED_NETWORK
        value: "true"
    metrics:
      enabled: true

# Persistence — SQLite-backed services only. Mounts at /var/lib/warden
# (matches WARDEN_*_DB defaults). Disable for emptyDir.
persistence:
  ledger:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  hil:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  identity:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# Cert bundle mount. Single k8s Secret carries the warden CA + per-service
# workload certs (B7 v1.x+2). Generate with
# `warden-proxy/scripts/gen_certs.sh --env prod` then
# `kubectl create secret generic warden-tls --from-file=warden-proxy/certs/`.
#
# Files expected in the Secret:
#   ca.crt                       — CA root, mounted on every pod
#   server.crt + server.key      — proxy's agent-facing server cert (proxy only)
#   client.crt + client.key      — agent client cert (legacy / starter agent)
#   service-<name>.crt + .key    — per-service workload identity with SAN URI
#                                  spiffe://warden.local/service/<name>;
#                                  one pair per backend service.
#
# Per-pod projection: each Deployment mounts only ca.crt + its own
# service-<name>.{crt,key} (proxy also gets server.{crt,key} + client.*).
# No pod can read another service's private key.
#
# Empty → no mount; proxy + identity pods will panic at boot
# (recurring-gotchas: tls.rs panics on missing cert file). Required for
# any non-trivial deploy.
#
# `proxyTls.secretName` was the v0.2.0 spelling; renamed to
# `tlsBundle.secretName` in v0.3.0 as part of the B7 v1.x+2 scaffold.
tlsBundle:
  secretName: ""
  mountPath: /certs
  # Auto-mint the bundle into `secretName` via a pre-install +
  # pre-upgrade Helm hook Job. Generates a self-signed CA root,
  # proxy server cert + client cert, and per-service workload certs
  # (one pair per name in `bundleServices`, with SPIFFE URI SANs).
  # The Job is idempotent — it skips if the target Secret already
  # carries `ca.crt`. Production deployments should leave this off
  # and supply the bundle from a managed PKI instead.
  autoMint: false
  # Workload names that get a per-service cert. The 8 default
  # warden services live here; "nats" is auto-appended by
  # `warden.bundleServices` when `nats.bundled.enabled`.
  bundleServices:
    - proxy
    - brain
    - policy-engine
    - ledger
    - hil
    - identity
    - deep-review
    - console
  # SPIFFE trust domain stamped into each workload cert's SAN URI
  # (URI:spiffe://<domain>/service/<name>). Matches the compose
  # stack's `warden.local`. Change only if you've adjusted the
  # `WARDEN_*_ALLOWED_CALLERS` allowlists on the consuming services.
  spiffeTrustDomain: warden.local
  # Auto-mint Job runs two containers sharing an emptyDir:
  #   mintImage  — openssl-only, generates CA + per-service certs
  #                into /work. alpine/openssl is ~10MB.
  #   applyImage — kubectl-only, writes /work to a k8s Secret.
  # Splitting lets both run under the chart-wide nonroot
  # podSecurityContext (UID 65532) — neither container needs root,
  # and there is no apk-at-runtime install.
  mintImage:
    repository: alpine/openssl
    tag: "3.3.2"
    pullPolicy: IfNotPresent
  applyImage:
    repository: alpine/k8s
    tag: "1.30.0"
    pullPolicy: IfNotPresent

# NetworkPolicy gating. Spec §"Threat model" §"Cross-cutting" treats
# k8s NetworkPolicy as the deployment perimeter. With this on, the
# backend services (brain/policy-engine/hil/ledger/identity) accept
# ingress only from proxy + console + deep-review. Proxy stays open
# (it's the agent-facing surface). Default off so a CNI without
# NetworkPolicy support (calico off, flannel without policy) still
# renders cleanly.
networkPolicy:
  enabled: false
  # Allow Prometheus to scrape /metrics on every pod. Set to the
  # namespace label selector your scraper runs in. Empty → no
  # additional ingress allowance beyond the proxy/console/deep-review
  # mesh.
  prometheusNamespaceLabel: ""

# PodDisruptionBudget. Only emitted for services where replicas > 1
# (SQLite-pinned services skip this naturally). minAvailable defaults
# to ceil(replicas/2) so a rolling node drain takes at most half a
# service down.
podDisruptionBudget:
  enabled: true

# Vault token Secret. When .vault.addr is set, the proxy and identity
# pods need VAULT_TOKEN. Operator provides a Secret with key `token`
# and points .vault.tokenSecretName at it.
# Already covered by .vault.tokenSecretName above.
