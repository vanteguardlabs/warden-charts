{{- /*
Alertmanager routing config — projected into a Secret because it
carries the Slack webhook URL and SMTP password. Discovered by
Alertmanager Operator via the `alertmanagerConfigSelector` (sidecar
shape mirrors prometheus_rule above). Disable by setting
`alertmanager.enabled: false` (the rules ship regardless via
`alerting.enabled` — operators may already have an alertmanager).

Channel separation: HIL approval pings go to `#warden-approvals`
(operator action required). Ops alerts go to `#warden-ops` (oncall
awareness). Different audiences, different rate limits — do not
reuse the HIL webhook.
*/}}
{{- if and .Values.alerting.enabled .Values.alertmanager.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "warden.fullname" . }}-alertmanager
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "alertmanager") | nindent 4 }}
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      {{- with .Values.alertmanager.email.smtp }}
      smtp_smarthost: '{{ .host }}:{{ .port | default 587 }}'
      smtp_from: '{{ $.Values.alertmanager.email.from | default "alerts@warden.local" }}'
      smtp_auth_username: '{{ .username }}'
      smtp_auth_password: '{{ .password }}'
      {{- end }}
    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-ops'
      routes:
        - matchers:
            - severity="critical"
          receiver: 'critical'
    receivers:
      - name: 'slack-ops'
        {{- with .Values.alertmanager.slack.opsWebhookUrl }}
        slack_configs:
          - api_url: '{{ . }}'
            channel: '#warden-ops'
            send_resolved: true
        {{- end }}
      - name: 'critical'
        {{- with .Values.alertmanager.slack.opsWebhookUrl }}
        slack_configs:
          - api_url: '{{ . }}'
            channel: '#warden-ops'
            send_resolved: true
        {{- end }}
        {{- with .Values.alertmanager.email.to }}
        email_configs:
          - to: '{{ . }}'
            send_resolved: true
        {{- end }}
{{- end }}
