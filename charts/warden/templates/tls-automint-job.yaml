{{/*
Pre-install + pre-upgrade hook Job that mints the warden TLS bundle.
Two stages share an emptyDir at /work:
  - initContainer `mint`  — openssl-only image, generates CA + per-
    service certs into /work.
  - main container `apply` — kubectl-only image, no-op if the target
    Secret already carries `ca.crt`; otherwise writes the bundle.
Splitting keeps the CA stable across upgrades (apply gates on the
existing Secret) and lets both containers run under the chart-wide
nonroot podSecurityContext — neither needs root.

Hook weight 0 (default) lands after the RBAC + script ConfigMap
(weight -20 / -15) and before the Vault bootstrap Job (post-install).
*/}}
{{- if .Values.tlsBundle.autoMint }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-tls-automint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "tls-automint") | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "warden.selectorLabels" (dict "ctx" . "service" "tls-automint") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Release.Name }}-tls-automint
      restartPolicy: OnFailure
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: mint
          image: "{{ .Values.tlsBundle.mintImage.repository }}:{{ .Values.tlsBundle.mintImage.tag }}"
          imagePullPolicy: {{ .Values.tlsBundle.mintImage.pullPolicy }}
          # alpine/openssl has ENTRYPOINT ["openssl"]; override so we
          # run our shell script instead of passing it to openssl.
          command: ["/bin/sh", "/script/mint.sh"]
          env:
            - name: SPIFFE_TRUST_DOMAIN
              value: {{ .Values.tlsBundle.spiffeTrustDomain | quote }}
            - name: BUNDLE_SERVICES
              value: {{ include "warden.bundleServices" . | quote }}
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
          volumeMounts:
            - name: script
              mountPath: /script
              readOnly: true
            - name: work
              mountPath: /work
      containers:
        - name: apply
          image: "{{ .Values.tlsBundle.applyImage.repository }}:{{ .Values.tlsBundle.applyImage.tag }}"
          imagePullPolicy: {{ .Values.tlsBundle.applyImage.pullPolicy }}
          command: ["/bin/sh", "/script/apply.sh"]
          env:
            - name: TLS_SECRET_NAME
              value: {{ .Values.tlsBundle.secretName | quote }}
            - name: POD_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: BUNDLE_SERVICES
              value: {{ include "warden.bundleServices" . | quote }}
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
          volumeMounts:
            - name: script
              mountPath: /script
              readOnly: true
            - name: work
              mountPath: /work
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ .Release.Name }}-tls-automint
            defaultMode: 0755
        - name: work
          emptyDir: {}
{{- end }}
