{{/*
Shared secrets that two or more warden services must agree on.
Mirrors the YAML-anchor pattern in `warden-e2e/<env>/docker-compose.yml`
(`*hil-session-key`, `*hil-decide-token`, `*demo-session-hs256`) so the
chart-deployed stack has the same cross-service shared-secret hygiene
as the compose stack.

Values are auto-minted on first install. On upgrade, `lookup` reads
the existing Secret and re-emits the same data so values stay stable
across helm upgrades — restarting HIL doesn't invalidate every
in-flight session, and console doesn't drift away from HIL on the
shared decide-token bearer.

Operators who want to supply their own values can either:
  * pre-create the Secret with the matching name + keys before
    `helm install` (lookup will pick it up), OR
  * `kubectl edit secret <release>-shared-tokens` after install
    (data persists across upgrades thanks to lookup).
*/}}
{{- $secretName := printf "%s-shared-tokens" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $hilDecideToken := "" }}
{{- $hilSessionKey := "" }}
{{- if $existing }}
{{- $hilDecideToken = index $existing.data "hil-decide-token" | default "" }}
{{- $hilSessionKey = index $existing.data "hil-session-key" | default "" }}
{{- end }}
{{- if not $hilDecideToken }}
{{- $hilDecideToken = randAlphaNum 48 | b64enc }}
{{- end }}
{{- if not $hilSessionKey }}
{{/* HIL parses WARDEN_HIL_SESSION_KEY as 64-char hex (32 bytes).
     sha256sum of a random 32-char alphanum is exactly that. */}}
{{- $hilSessionKey = randAlphaNum 32 | sha256sum | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "shared-tokens") | nindent 4 }}
type: Opaque
data:
  hil-decide-token: {{ $hilDecideToken }}
  hil-session-key: {{ $hilSessionKey }}
