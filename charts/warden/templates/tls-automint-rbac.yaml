{{/*
ServiceAccount + Role + RoleBinding scoped to the release namespace.
The mint Job needs `get/create/patch` on Secrets in this namespace
only — never cluster-wide, never on other resource kinds.

All three resources are `helm.sh/hook` resources at weight -20 so
they exist before the Job (weight 0) starts, and delete after the
hook succeeds.
*/}}
{{- if .Values.tlsBundle.autoMint }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-tls-automint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "tls-automint") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-tls-automint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "tls-automint") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-tls-automint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "tls-automint") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-tls-automint
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-tls-automint
{{- end }}
