{{/*
warden-exec — execution-gateway MCP server. Sits between the proxy
and the upstream MCP (the bundled stub or a real backend), exposing
seven tools that mirror Claude Code's built-ins. Gated on
`exec.enabled`. Single replica because the workspace PVC is shared
RW with the lab agent pod; multi-replica would race writes.

Composition:
  proxy WARDEN_UPSTREAM_URL → warden-exec  (this template)
                              ├─ exec tools? run locally inside sandbox
                              └─ everything else (initialize,
                                 resources/*, prompts/*, non-exec
                                 tools/call) forward to
                                 WARDEN_EXEC_FALLBACK_URL =
                                 upstream-stub

`upstreamStub.enabled` typically stays true alongside this so the
fallback target exists; `exec.enabled` without `upstreamStub.enabled`
leaves the agent without an `initialize` upstream and most clients
will refuse to handshake.
*/}}
{{- if .Values.exec.enabled }}
{{- $name := "exec" }}
{{- $fullname := printf "%s-%s" .Release.Name $name }}
{{- $tag := default .Values.imageTag .Values.exec.image.tag }}
{{- if not $tag }}{{ $tag = .Chart.AppVersion }}{{ end }}
{{- $stubFullname := printf "%s-upstream-stub" .Release.Name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" $name) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "warden.selectorLabels" (dict "ctx" . "service" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "warden.selectorLabels" (dict "ctx" . "service" $name) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ include "warden.terminationGrace" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ .Values.exec.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.exec.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.exec.port }}
              protocol: TCP
          env:
            - name: WARDEN_EXEC_PORT
              value: {{ .Values.exec.port | quote }}
            - name: WARDEN_EXEC_WORKSPACE
              value: /workspace
            - name: WARDEN_EXEC_TIMEOUT_SECS
              value: {{ .Values.exec.timeoutSecs | quote }}
            {{- if .Values.upstreamStub.enabled }}
            - name: WARDEN_EXEC_FALLBACK_URL
              value: "http://{{ $stubFullname }}:{{ .Values.upstreamStub.port }}/mcp"
            {{- end }}
            {{- with .Values.exec.fetchAllowlist }}
            - name: WARDEN_EXEC_NETPOLICY_ALLOWLIST
              value: {{ join "," . | quote }}
            {{- end }}
          # readOnlyRootFilesystem keeps every writable surface
          # explicit; workspace + tmp ride dedicated mounts.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.exec.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.exec.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.exec.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ $fullname }}-workspace
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.exec.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "warden.selectorLabels" (dict "ctx" . "service" $name) | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-workspace
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" $name) | nindent 4 }}
spec:
  accessModes:
    # ReadWriteOnce works for v1 because warden-exec + the lab agent
    # pod schedule onto the same node in single-node clusters (kind,
    # k3s, lab). Multi-node clusters that want both pods mounting
    # this PVC must flip to RWX and supply a storageClass that
    # supports it.
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.exec.workspaceSize }}
{{- end }}
