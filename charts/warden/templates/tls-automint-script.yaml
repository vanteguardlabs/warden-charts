{{/*
ConfigMap carrying the two shell scripts that mint + apply the warden
TLS bundle. Loaded as a `helm.sh/hook: pre-install,pre-upgrade`
resource so the hook Job (tls-automint-job.yaml) can mount it;
deleted after the Job succeeds via hook-delete-policy.

mint.sh runs in the openssl initContainer (alpine/openssl) and
generates CA root + proxy server cert + agent client cert + per-
service workload certs with SPIFFE URI SANs into a shared emptyDir.

apply.sh runs in the kubectl main container (alpine/k8s) and writes
the bundle into a single k8s Secret. Idempotent: re-runs are no-ops
when the Secret already carries `ca.crt`, which keeps the CA stable
across helm upgrades.
*/}}
{{- if .Values.tlsBundle.autoMint }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tls-automint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "tls-automint") | nindent 4 }}
data:
  mint.sh: |
    #!/bin/sh
    # Generate the warden TLS material into /work. Runs in the
    # openssl-only initContainer. apply.sh later decides whether to
    # ship it to the cluster.
    set -eu

    : "${SPIFFE_TRUST_DOMAIN:?must be set}"
    : "${BUNDLE_SERVICES:?must be set}"
    : "${RELEASE_NAME:?must be set}"

    cd /work

    # 1. CA root. 1-year lifetime mirrors gen_certs.sh.
    openssl genrsa -out ca.key 2048 2>/dev/null
    openssl req -new -x509 -days 365 -key ca.key -out ca.crt \
        -subj "/CN=AgentWardenCA" 2>/dev/null

    # 2. Proxy's agent-facing server cert. SAN list matches the
    # compose stack (localhost + proxy + proxy.warden.local) so the
    # same script can serve out-of-cluster reach via NodePort, too.
    openssl genrsa -out server.key 2048 2>/dev/null
    openssl req -new -key server.key -out server.csr \
        -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,DNS:proxy,DNS:proxy.warden.local" \
        2>/dev/null
    openssl x509 -req -days 365 -in server.csr \
        -CA ca.crt -CAkey ca.key -CAcreateserial \
        -copy_extensions copy -out server.crt 2>/dev/null

    # 3. Generic agent starter client cert (CN=agent-001).
    openssl genrsa -out client.key 2048 2>/dev/null
    openssl req -new -key client.key -out client.csr \
        -subj "/CN=agent-001" 2>/dev/null
    openssl x509 -req -days 365 -in client.csr \
        -CA ca.crt -CAkey ca.key -CAcreateserial \
        -out client.crt 2>/dev/null

    # 4. Per-service workload certs. SAN list covers every hostname
    # warden code may dial:
    #   - URI:spiffe://...  for server-side SPIFFE allowlists
    #   - DNS:${svc}        for the compose stack + chart-internal
    #                       short-name use
    #   - DNS:${RELEASE_NAME}-${svc}
    #                       for the in-cluster Service DNS that
    #                       warden.serviceFullname / warden.natsUrl /
    #                       warden.backendEnvs all hand to clients
    #                       (e.g. `lab-warden-nats`). Without this,
    #                       rustls rejects every in-cluster mTLS
    #                       handshake with NotValidForName.
    #   - DNS:localhost     for cargo-run / host-side testing.
    for svc in $BUNDLE_SERVICES; do
        openssl genrsa -out "service-${svc}.key" 2048 2>/dev/null
        openssl req -new -key "service-${svc}.key" \
            -out "service-${svc}.csr" \
            -subj "/CN=warden-${svc}" \
            -addext "subjectAltName=URI:spiffe://${SPIFFE_TRUST_DOMAIN}/service/${svc},DNS:${svc},DNS:${RELEASE_NAME}-${svc},DNS:localhost" \
            2>/dev/null
        openssl x509 -req -days 365 \
            -in "service-${svc}.csr" \
            -CA ca.crt -CAkey ca.key -CAcreateserial \
            -copy_extensions copy \
            -out "service-${svc}.crt" 2>/dev/null
    done

    rm -f ./*.csr ca.srl
    echo "Bundle generated into /work"

  apply.sh: |
    #!/bin/sh
    # Write the bundle in /work to a single k8s Secret. Runs in the
    # kubectl-only main container. Idempotent: re-runs are no-ops when
    # the existing Secret was minted under the *same* SAN scheme.
    #
    # SAN-scheme drift detection: the Secret carries a label
    # `warden.vanteguardlabs.com/san-scheme` recording the mint shape
    # in effect when it was written. apply.sh compares against
    # EXPECTED_SAN_SCHEME (bumped in this script whenever the mint-time
    # SAN/extension shape changes — e.g. adding release-prefixed DNS
    # SANs). On mismatch, the bundle is re-written; on match, skipped.
    # Catches the "upgrade picked up a chart that mints differently"
    # case without operators having to `kubectl delete secret` first.
    set -eu

    : "${TLS_SECRET_NAME:?must be set}"
    : "${POD_NAMESPACE:?must be set}"
    : "${BUNDLE_SERVICES:?must be set}"

    # Bump this string whenever the mint.sh SAN/extension shape OR
    # the on-cluster bundle layout changes.
    #   v1 = ca.crt + DNS:${svc} only
    #   v2 = + DNS:${RELEASE_NAME}-${svc} + ca.key (mounted only in
    #         identity's pod via the per-pod items: projection in
    #         services.yaml — every other service's /certs still
    #         omits ca.key, so a compromised brain/policy/hil/ledger
    #         pod cannot read the CA private key from disk).
    EXPECTED_SAN_SCHEME="release-prefixed-v2"

    cd /work

    if kubectl -n "${POD_NAMESPACE}" get secret "${TLS_SECRET_NAME}" \
         -o jsonpath='{.data.ca\.crt}' 2>/dev/null | grep -q .; then
        existing_scheme="$(
            kubectl -n "${POD_NAMESPACE}" get secret "${TLS_SECRET_NAME}" \
                -o jsonpath='{.metadata.labels.warden\.vanteguardlabs\.com/san-scheme}' \
                2>/dev/null || true
        )"
        if [ "$existing_scheme" = "$EXPECTED_SAN_SCHEME" ]; then
            echo "Secret ${POD_NAMESPACE}/${TLS_SECRET_NAME} already carries ca.crt + scheme ${EXPECTED_SAN_SCHEME}; skipping apply"
            exit 0
        fi
        echo "Secret ${POD_NAMESPACE}/${TLS_SECRET_NAME} exists but san-scheme is '${existing_scheme:-<missing>}' (expected ${EXPECTED_SAN_SCHEME}); re-minting"
    fi
    echo "Writing fresh bundle to Secret ${POD_NAMESPACE}/${TLS_SECRET_NAME}"

    # dry-run + apply gives create-or-replace semantics, and the
    # Job's RBAC has both verbs. ca.key is in the bundle but only
    # identity's per-pod items: projection (services.yaml) opts in to
    # mounting it — no other pod sees ca.key on disk.
    args="--from-file=ca.crt --from-file=ca.key"
    args="${args} --from-file=server.crt --from-file=server.key"
    args="${args} --from-file=client.crt --from-file=client.key"
    for svc in $BUNDLE_SERVICES; do
        args="${args} --from-file=service-${svc}.crt --from-file=service-${svc}.key"
    done
    # shellcheck disable=SC2086
    kubectl -n "${POD_NAMESPACE}" create secret generic "${TLS_SECRET_NAME}" \
        ${args} \
        --dry-run=client -o yaml \
        | kubectl -n "${POD_NAMESPACE}" apply -f -

    # Stamp the scheme label so future apply.sh runs can detect drift.
    # --overwrite handles the upgrade case (label exists from prior scheme).
    kubectl -n "${POD_NAMESPACE}" label --overwrite secret "${TLS_SECRET_NAME}" \
        "warden.vanteguardlabs.com/san-scheme=${EXPECTED_SAN_SCHEME}"

    echo "Bundle written to Secret ${POD_NAMESPACE}/${TLS_SECRET_NAME} (scheme=${EXPECTED_SAN_SCHEME})"
{{- end }}
