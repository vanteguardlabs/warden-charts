{{/*
Emit a Deployment + Service per enabled service, plus a PVC when
.Values.persistence.<service>.enabled. PVCs mount at /var/lib/warden,
which matches the WARDEN_*_DB defaults.

`$` is the root context — passed explicitly to helpers because `.`
inside the range is the iterated value.
*/}}
{{- range $name, $cfg := .Values.services }}
{{- if $cfg.enabled }}
{{- $persist := index $.Values.persistence $name | default dict }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 8 }}
      annotations:
        {{- include "warden.metricsAnnotations" (dict "svcCfg" $cfg) | trim | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ include "warden.terminationGrace" $ }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name | kebabcase }}
          image: {{ include "warden.imageRef" (dict "ctx" $ "svcCfg" $cfg) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.port }}
              protocol: TCP
            {{- if and $cfg.healthPort (ne (int $cfg.healthPort) (int $cfg.port)) }}
            - name: health
              containerPort: {{ $cfg.healthPort }}
              protocol: TCP
            {{- end }}
          env:
            {{- include "warden.commonEnv" (dict "ctx" $ "svcCfg" $cfg "service" $name) | nindent 12 }}
            {{- if and $.Values.vault.tokenSecretName (or (eq $name "proxy") (eq $name "identity")) }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.tokenSecretName }}
                  key: token
            {{- end }}
          livenessProbe:
            {{- include "warden.probe" (dict "ctx" $ "svcCfg" $cfg "kind" "liveness") | nindent 12 }}
          readinessProbe:
            {{- include "warden.probe" (dict "ctx" $ "svcCfg" $cfg "kind" "readiness") | nindent 12 }}
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          {{- $mountsCert := and $.Values.proxyTls.secretName (or (eq $name "proxy") (eq $name "identity")) }}
          {{- if or $persist.enabled $mountsCert }}
          volumeMounts:
            {{- if $persist.enabled }}
            - name: data
              mountPath: /var/lib/warden
            {{- end }}
            {{- if $mountsCert }}
            - name: certs
              mountPath: {{ $.Values.proxyTls.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or $persist.enabled $mountsCert }}
      volumes:
        {{- if $persist.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}-data
        {{- end }}
        {{- if $mountsCert }}
        - name: certs
          secret:
            secretName: {{ $.Values.proxyTls.secretName }}
            # 0644 on the key files — warden services run as nonroot
            # UID 65532, and `gen_certs.sh` chmods to the same mode on
            # the host. k8s Secret mounts default to 0644 anyway, but
            # pinning is explicit so a re-mode by a downstream patch
            # doesn't lock out the proxy at next pod boot.
            defaultMode: 0644
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  type: {{ $cfg.serviceType }}
  ports:
    - port: {{ $cfg.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 4 }}
{{- if $persist.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}-data
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  accessModes:
    - {{ $persist.accessMode | default "ReadWriteOnce" }}
  {{- if $persist.storageClass }}
  storageClassName: {{ $persist.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $persist.size | default "1Gi" }}
{{- end }}
{{- end }}
{{- end }}
