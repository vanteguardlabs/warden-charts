{{/*
Emit a Deployment + Service per enabled service, plus a PVC when
.Values.persistence.<service>.enabled. PVCs mount at /var/lib/warden,
which matches the WARDEN_*_DB defaults.

`$` is the root context — passed explicitly to helpers because `.`
inside the range is the iterated value.
*/}}
{{- range $name, $cfg := .Values.services }}
{{- if $cfg.enabled }}
{{- $persist := index $.Values.persistence $name | default dict }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 8 }}
      annotations:
        {{- include "warden.metricsAnnotations" (dict "svcCfg" $cfg) | trim | nindent 8 }}
        {{- if $.Values.tlsBundle.autoMint }}
        # Roll the pod when the auto-mint script changes — the SAN
        # scheme or extension shape might have shifted, which triggers
        # apply.sh to re-mint the Secret. Pods that mounted the old
        # bundle would otherwise keep using the stale cert/CA until
        # something else forced a restart.
        checksum/tls-automint-script: {{ include (print $.Template.BasePath "/tls-automint-script.yaml") $ | sha256sum }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ include "warden.terminationGrace" $ }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name | kebabcase }}
          image: {{ include "warden.imageRef" (dict "ctx" $ "svcCfg" $cfg) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.port }}
              protocol: TCP
            {{- if and $cfg.healthPort (ne (int $cfg.healthPort) (int $cfg.port)) }}
            - name: health
              containerPort: {{ $cfg.healthPort }}
              protocol: TCP
            {{- end }}
            {{- if and $cfg.mtlsPort $.Values.tlsBundle.secretName }}
            - name: mtls
              containerPort: {{ $cfg.mtlsPort }}
              protocol: TCP
            {{- end }}
          env:
            {{- include "warden.commonEnv" (dict "ctx" $ "svcCfg" $cfg "service" $name) | nindent 12 }}
            {{- $vaultTokenSecret := include "warden.vaultTokenSecretName" $ }}
            {{- if and $vaultTokenSecret (or (eq $name "proxy") (eq $name "identity")) }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $vaultTokenSecret }}
                  key: token
            # VAULT_ADDR has to accompany VAULT_TOKEN — vaultrs falls
            # back to its compiled-in https://127.0.0.1:8200 default
            # without it, which the proxy can never reach inside a pod.
            # The ConfigMap carries the helper-computed URL (in-cluster
            # Service DNS under bundled mode, .Values.vault.addr under
            # BYO).
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "warden.fullname" $ }}-config
                  key: VAULT_ADDR
            {{- end }}
            {{- if or (eq $name "hil") (eq $name "console") }}
            # WARDEN_HIL_DECIDE_TOKEN: shared bearer for the
            # console → HIL /decide hop. HIL rejects /decide without
            # a matching bearer when console runs in oidc/disabled
            # mode; console panics at boot if the env is empty.
            - name: WARDEN_HIL_DECIDE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-shared-tokens
                  key: hil-decide-token
            {{- end }}
            {{- if eq $name "hil" }}
            # WARDEN_HIL_SESSION_KEY: HIL session-cookie HMAC key
            # (64-char hex). HIL auto-mints an ephemeral key when unset,
            # which would invalidate every session on pod restart — pin
            # it to the chart-managed Secret so HIL is restart-safe.
            - name: WARDEN_HIL_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-shared-tokens
                  key: hil-session-key
            {{- end }}
          livenessProbe:
            {{- include "warden.probe" (dict "ctx" $ "svcCfg" $cfg "kind" "liveness") | nindent 12 }}
          readinessProbe:
            {{- include "warden.probe" (dict "ctx" $ "svcCfg" $cfg "kind" "readiness") | nindent 12 }}
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          {{- $mountsCert := $.Values.tlsBundle.secretName }}
          {{- if or $persist.enabled $mountsCert }}
          volumeMounts:
            {{- if $persist.enabled }}
            - name: data
              mountPath: /var/lib/warden
            {{- end }}
            {{- if $mountsCert }}
            - name: certs
              mountPath: {{ $.Values.tlsBundle.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or $persist.enabled $mountsCert }}
      volumes:
        {{- if $persist.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}-data
        {{- end }}
        {{- if $mountsCert }}
        - name: certs
          secret:
            secretName: {{ $.Values.tlsBundle.secretName }}
            # 0644 on the key files — warden services run as nonroot
            # UID 65532, and `gen_certs.sh` chmods to the same mode on
            # the host. k8s Secret mounts default to 0644 anyway, but
            # pinning is explicit so a re-mode by a downstream patch
            # doesn't lock out the pod at next boot.
            defaultMode: 0644
            # Per-pod projection: each backend mounts only ca.crt +
            # its own service-<name>.{crt,key}, so a compromised pod
            # cannot read another service's private key. Proxy +
            # identity additionally mount server.{crt,key} (proxy's
            # agent-facing mTLS server cert) and client.{crt,key}
            # (legacy starter-agent client cert).
            #
            # `items:` is build with the helper to keep the projection
            # consistent with the per-service naming. A missing key
            # in the Secret silently omits the mount entry; the pod
            # then panics at boot per the recurring-gotcha note.
            items:
              - key: ca.crt
                path: ca.crt
              - key: service-{{ $name | kebabcase }}.crt
                path: service-{{ $name | kebabcase }}.crt
              - key: service-{{ $name | kebabcase }}.key
                path: service-{{ $name | kebabcase }}.key
              {{- if eq $name "proxy" }}
              - key: server.crt
                path: server.crt
              - key: server.key
                path: server.key
              - key: client.crt
                path: client.crt
              - key: client.key
                path: client.key
              {{- end }}
              {{- if eq $name "identity" }}
              # Identity roots the trust chain and reads ca.key to mint
              # SVIDs / delegation grants. Only identity's pod opts into
              # this projection — every other service's /certs omits
              # ca.key, so a compromised brain/policy/hil/ledger pod
              # cannot read the CA private key from disk.
              - key: ca.key
                path: ca.key
              {{- end }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  type: {{ $cfg.serviceType }}
  ports:
    - port: {{ $cfg.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if and $cfg.mtlsPort $.Values.tlsBundle.secretName }}
    # Dual-port surface: console / proxy / deep-review reach the
    # internal SPIFFE-gated subset here. Kept off when no TLS bundle
    # is mounted — the in-pod mTLS listener wouldn't be up to receive.
    - port: {{ $cfg.mtlsPort }}
      targetPort: mtls
      protocol: TCP
      name: mtls
    {{- end }}
  selector:
    {{- include "warden.selectorLabels" (dict "ctx" $ "service" $name) | nindent 4 }}
{{- if $persist.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "warden.serviceFullname" (dict "ctx" $ "service" $name) }}-data
  labels:
    {{- include "warden.labels" (dict "ctx" $ "service" $name) | nindent 4 }}
spec:
  accessModes:
    - {{ $persist.accessMode | default "ReadWriteOnce" }}
  {{- if $persist.storageClass }}
  storageClassName: {{ $persist.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $persist.size | default "1Gi" }}
{{- end }}
{{- end }}
{{- end }}
