{{/*
Bundled-mode dev-token Secret. Emitted only when vault.bundled.enabled
is true. The upstream hashicorp/vault subchart runs in dev mode with
a known root token (vault.bundled.devToken); proxy + identity pods
look up VAULT_TOKEN through this Secret by name (resolved by the
warden.vaultTokenSecretName helper). BYO Vault deployments override
vault.tokenSecretName and skip this template entirely.

Dev mode is in-memory — vault-bootstrap-job re-creates the transit
key on every chart upgrade. Production deployments should disable
bundled and supply their own token through an externally-managed
Secret.
*/}}
{{- if .Values.vault.bundled.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-vault-token
  labels:
    {{- include "warden.labels" (dict "ctx" . "service" "vault-token") | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.vault.bundled.devToken | quote }}
{{- end }}
