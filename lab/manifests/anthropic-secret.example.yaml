# DO NOT APPLY THIS FILE.
#
# It documents the shape of the Anthropic-API-key Secret the agent pod
# reads, but the actual Secret must be created out-of-band so no real
# key lands in git. Run:
#
#   kubectl -n warden create secret generic claude-code-agent-anthropic \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# Or for a sealed-secrets / external-secrets flow, point at your
# operator's tooling and ensure the resulting Secret carries the
# `ANTHROPIC_API_KEY` key. The agent pod manifest's
# `secretKeyRef.name=claude-code-agent-anthropic` must match.
apiVersion: v1
kind: Secret
metadata:
  name: claude-code-agent-anthropic
type: Opaque
stringData:
  ANTHROPIC_API_KEY: REPLACE_ME_OUT_OF_BAND
