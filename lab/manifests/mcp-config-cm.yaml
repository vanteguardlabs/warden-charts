# Claude Code MCP config. Loaded as the agent pod's `~/.claude.json`.
#
# The args array mirrors repos/warden-ctl/docs/clients/claude-code.md
# verbatim — only the cert paths change to the in-cluster mount
# (/certs from the tlsBundle Secret) and the proxy URL points at the
# in-cluster Service DNS.
#
# URL uses the BARE Service name (`proxy`), not `<release>-proxy`,
# because the chart's auto-mint script stamps the proxy's server cert
# SAN with `DNS:proxy, DNS:proxy.warden.local, DNS:localhost` — no
# `<release>-proxy` entry. Bare `proxy` resolves within the same
# namespace as the agent pod (apply this ConfigMap into the warden
# namespace alongside the release). For cross-namespace agents, use
# the fully-qualified `proxy.<namespace>.svc.cluster.local` and add
# that DNS to the auto-mint SAN list (chart change, not a manifest
# tweak).
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-code-agent-mcp-config
  labels:
    app.kubernetes.io/name: warden-lab
    app.kubernetes.io/component: claude-code-agent
data:
  .claude.json: |
    {
      "mcpServers": {
        "warden": {
          "command": "/usr/local/bin/wardenctl",
          "args": [
            "mcp-bridge",
            "--url",   "https://proxy:8443/mcp",
            "--cert",  "/certs/client.crt",
            "--key",   "/certs/client.key",
            "--ca",    "/certs/ca.crt",
            "--client-hint", "claude-code"
          ]
        }
      }
    }
