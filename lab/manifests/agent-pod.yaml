# Interactive Claude Code agent pod. Operator drives it via:
#   kubectl exec -it claude-code-agent -- claude
#
# Mounts:
#   /certs — warden tlsBundle Secret (chart-auto-minted CA + starter
#            client cert + key). Read-only.
#   /home/agent — writable emptyDir. An initContainer copies the
#            mcp-config ConfigMap to /home/agent/.claude.json so Claude
#            Code can update its own onboarding state / telemetry
#            counters in place. Mounting the ConfigMap directly with
#            subPath makes the file read-only and hangs the first-run
#            wizard on a write that silently fails.
#   ANTHROPIC_API_KEY — operator-provided Secret. Create it with
#            `kubectl create secret generic claude-code-agent-anthropic
#             --from-literal=ANTHROPIC_API_KEY=sk-ant-...`.
#
# The image needs to exist at the tagged path — see
# lab/scripts/build-agent-image.sh. The release name placeholder
# `my-warden` appears in two spots (image tag's appVersion + proxy URL
# in the ConfigMap); change both before applying for a non-default
# release.
apiVersion: v1
kind: Pod
metadata:
  name: claude-code-agent
  labels:
    app.kubernetes.io/name: warden-lab
    app.kubernetes.io/component: claude-code-agent
spec:
  restartPolicy: Always
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  initContainers:
    - name: prime-home
      image: ghcr.io/vanteguardlabs/warden-claude-code-agent:latest
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          cp /config/.claude.json /home/agent/.claude.json
          # Claude Code creates ~/.claude during first run; pre-create
          # the dir so the runtime container doesn't race on it.
          mkdir -p /home/agent/.claude
      volumeMounts:
        - name: home
          mountPath: /home/agent
        - name: mcp-config-src
          mountPath: /config
          readOnly: true
  containers:
    - name: agent
      image: ghcr.io/vanteguardlabs/warden-claude-code-agent:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: claude-code-agent-anthropic
              key: ANTHROPIC_API_KEY
      # readOnlyRootFilesystem keeps every writable surface explicit.
      # The Claude Code CLI writes to ~/.claude (home emptyDir) and
      # /tmp (tmp emptyDir); npm cache rides ~/.npm under the same
      # emptyDir. /workspace is the only path warden-exec lets the
      # agent ask for write-shaped operations under, and the
      # exec-workspace PVC is shared RW between this pod and warden-exec
      # so an operator can still `kubectl exec -- ls /workspace`.
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
        - name: home
          mountPath: /home/agent
        - name: tmp
          mountPath: /tmp
        - name: workspace
          mountPath: /workspace
        # Managed settings: read-only mount at the path Claude Code
        # walks for unbypassable settings. Putting deny rules in
        # ~/.claude.json or ~/.claude/settings.json does NOT work —
        # the agent can rewrite both at runtime. /etc/claude-code/
        # is the only path that survives that.
        - name: managed-settings
          mountPath: /etc/claude-code
          readOnly: true
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 1000m, memory: 1Gi }
  volumes:
    - name: certs
      secret:
        # Matches the chart's `tlsBundle.secretName`. The tests/values-
        # bundled.yaml ships `smoke-tls`; override here if your release
        # used a different Secret name.
        secretName: smoke-tls
        defaultMode: 0644
        items:
          - key: ca.crt
            path: ca.crt
          - key: client.crt
            path: client.crt
          - key: client.key
            path: client.key
    - name: home
      emptyDir: {}
    - name: tmp
      emptyDir: {}
    - name: workspace
      persistentVolumeClaim:
        # Provisioned by the chart's exec.yaml template as
        # `<release>-exec-workspace` when exec.enabled=true. Replace
        # `my-warden` to match the release name (same edit as the
        # image-tag note at the top of this file).
        claimName: my-warden-exec-workspace
    - name: mcp-config-src
      configMap:
        name: claude-code-agent-mcp-config
    - name: managed-settings
      configMap:
        name: claude-code-agent-managed-settings
