# Canonical bundled-mode test fixture. Used by CI (helm template +
# kubeconform) and by `helm install -f tests/values-bundled.yaml`
# for local kind smoke tests. Mirrors the docker-compose stack
# shape: single-node NATS with JetStream, dev-mode Vault, mTLS
# wired through the auto-mint pre-install Job.

nats:
  bundled:
    enabled: true
  # Pass-through to the nats-io/nats subchart (v1.2.5). Enables
  # JetStream with a 5Gi PVC; single-replica matches the compose
  # default. HA (3-node Raft) flips `cluster.enabled` upstream.
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 5Gi
    # mTLS on :4222. Reuses the auto-mint smoke-tls Secret — the Job
    # appends "nats" to BUNDLE_SERVICES (see warden.bundleServices in
    # _helpers.tpl) so service-nats.{crt,key} land alongside ca.crt
    # inside the same Secret. `merge.verify: true` is the only way to
    # require client certs on the upstream chart; the chart's typed
    # tls block doesn't expose `verify` directly (chart README: "note:
    # `tls.verify` still must be set in the appropriate nats config
    # `tls` blocks to require mTLS").
    nats:
      tls:
        enabled: true
        secretName: smoke-tls
        cert: service-nats.crt
        key: service-nats.key
        merge:
          verify: true
  # Mounts ca.crt from smoke-tls into every nats config tls block (the
  # generated nats.conf picks it up as `ca_file:`). Without this, the
  # NATS server has nothing to validate client certs against and mTLS
  # fails with `tls: bad certificate`.
  tlsCA:
    enabled: true
    secretName: smoke-tls
    key: ca.crt
  # nats-box is a debugging helper; not needed for the warden stack.
  natsBox:
    enabled: false

vault:
  bundled:
    enabled: true
  # Pass-through to the hashicorp/vault subchart (v0.28.1). Dev
  # server mode mirrors compose: in-memory, auto-unsealed, root
  # token = `root`.
  server:
    dev:
      enabled: true
      devRootToken: root
  # Agent-injector adds a cluster-wide MutatingWebhookConfiguration
  # and an extra Deployment to sidecar-inject Vault secrets into
  # arbitrary pods. We use a static-token Secret instead, so disable
  # the injector entirely.
  injector:
    enabled: false

tlsBundle:
  # Pre-install Job mints CA + per-service workload certs into this
  # Secret. Job is idempotent — re-running on an existing bundle is a
  # no-op (script gates on `ca.crt`).
  secretName: smoke-tls
  autoMint: true

# Bundled echo-MCP target. Deploys warden-upstream-stub as a sidecar
# Deployment + Service and auto-wires WARDEN_UPSTREAM_URL on the
# proxy. Pairs with agentVaultSeed below — without the stub credential
# in Vault, the proxy 403s every request. With `exec.enabled: true`
# below, the stub becomes the warden-exec fallback target (initialize,
# resources/*, echo, add) rather than the proxy's upstream.
upstreamStub:
  enabled: true

# warden-exec sits between the proxy and the upstream-stub: it runs
# the seven Claude-Code-built-in-parity tools (bash, read_file, …)
# locally and forwards every other MCP frame to the stub. The lab
# Claude Code pod (lab/manifests/) has its built-ins denylisted, so
# the only path to a shell or file op runs through warden-exec, which
# means through the full warden security pipeline.
exec:
  enabled: true

# Seed Vault with a stub api_key for the auto-mint starter cert's
# CN (`agent-001`). Required for the proxy to accept agent traffic
# in the lab evaluation flow.
agentVaultSeed:
  enabled: true

# Bare-name DNS alias from `proxy` to <release>-proxy so in-cluster
# agents can dial `https://proxy:8443/mcp` and the TLS SNI matches
# the auto-mint server cert SAN. Required for the lab Claude Code
# pod (and the simulator under chart deployments) to handshake
# without a per-release manifest tweak.
proxyAlias:
  enabled: true
